networks:
  app_network:
    name: ${network}
    external: true

volumes:
  sqlserver-data:
    external: true
    name: ${SQLSERVER_INITDB_VOLUME}

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: natillera-sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQLSERVER_SA_PASSWORD}
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      # Se agrega -C para confiar en el certificado y la ruta es /opt/mssql-tools18/
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "${SQLSERVER_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s # Bajamos el intervalo para que revise más seguido al inicio
      timeout: 5s
      retries: 10 # Aumentamos reintentos para darle tiempo a arrancar
    networks:
      - app_network
